<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gửi My ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@400;600;700;800&family=Playfair+Display:ital@1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- Canvas vũ trụ 3D (Three.js) – nền chính -->
    <canvas id="threeCanvas"></canvas>

    <!-- Canvas pháo hoa -->
    <canvas id="fireworkCanvas"></canvas>

    <!-- Dải ngân hà sao (CSS) -->
    <div id="galaxy"></div>

    <!-- Đàn bướm -->
    <div class="butterfly-container" id="butterflyContainer"></div>

    <!-- MÀN HÌNH CHÀO -->
    <div id="welcome-screen">
        <div class="welcome-content">
            <div class="welcome-heart">💖</div>
            <h1 class="welcome-title">My ơi</h1>
            <p class="welcome-subtitle">đây là lời nhắn yêu thương của Đức</p>
            <button id="btnStart">Bắt đầu 💌</button>
        </div>
    </div>

    <!-- LOADING -->
    <div id="loading">
        <div class="heart-loader">
            <svg viewBox="0 0 32 29" xmlns="http://www.w3.org/2000/svg">
                <path fill="#e0397a" d="M16 29 C6 21 0 15.5 0 9 C0 3.5 4.2 0 9 0 C12 0 14.5 1.6 16 4.2 C17.5 1.6 20 0 23 0 C27.8 0 32 3.5 32 9 C32 15.5 26 21 16 29 Z"/>
            </svg>
            <div class="loader-glow"></div>
        </div>
        <div class="loading-track"><div class="loading-fill" id="fill"></div></div>
        <div class="loading-label">Loading Love</div>
        <div class="loading-pct" id="pct">0%</div>
    </div>

    <!-- MAIN CARD -->
    <div class="stage" id="mainStage">
        <div class="card" id="mainCard">
            <div class="neon-border"></div>
            <div class="music-toggle" id="musicToggle" title="Bật/tắt nhạc">🎵</div>
            <div class="ribbon">💌</div>
            <div class="title">Gửi My yêu dấu</div>
            <div class="subtitle">mãi bên nhau em nhé</div>

            <div class="step active" id="loveStep">
                <div class="msg-heart">💝</div>
                <div class="msg-title">Lời anh muốn nói…</div>

                <!-- Đếm ngày yêu -->
                <div id="dayCounterBox">
                    <div class="dc-num" id="dayCount">0</div>
                    <div class="dc-label">ngày mình đã bên nhau, từ 19/06/2025</div>
                </div>

                <div class="msg-body" id="finalMessage"></div>
                <div class="msg-signature">— Đức —</div>

                <!-- Album ảnh kỷ niệm -->
                <div id="albumBox">
                    <div class="album-label">một vài khoảnh khắc của tụi mình</div>
                    <div class="album-row">
                        <img src="photo1.jpg" alt="kỷ niệm 1">
                        <img src="photo2.jpg" alt="kỷ niệm 2">
                    </div>
                </div>

                <div class="lyrics-box">
                    <marquee behavior="scroll" direction="left" scrollamount="3">
                        <span class="lyrics-line">🎵 Yêu em từ cái nhìn đầu tiên... Tình anh như nắng mai... Dù bao lâu vẫn không phai...</span>
                    </marquee>
                </div>

                <!-- Có / Không -->
                <div id="choiceZone">
                    <div id="choiceRow">
                        <button id="btnYes">Có chứ 💫</button>
                        <button id="btnNo">Không</button>
                    </div>
                    <div id="choiceResult"></div>
                </div>
            </div>

            <!-- ROAD SCENE -->
            <div class="road-scene">
                <div class="sky-hearts">
                    <span style="left:10%; top:6px; animation-delay:0s;">❤</span>
                    <span style="left:40%; top:14px; animation-delay:.6s;">❤</span>
                    <span style="left:70%; top:4px; animation-delay:1.1s;">❤</span>
                    <span style="left:85%; top:20px; animation-delay:.3s;">❤</span>
                </div>
                <div class="asphalt"></div>
                <div class="lane-marks"></div>
                <div class="car-wrap">
                    <svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 68 C10 50 25 46 40 46 L58 30 C63 25 70 22 78 22 L135 22 C145 22 152 27 158 36 L172 55 C182 56 190 60 192 68 L192 78 L10 78 Z" fill="#ff6f9c" stroke="#c23260" stroke-width="2"/>
                        <path d="M80 30 L132 30 C138 30 142 33 146 38 L156 52 L86 52 Z" fill="#eaf6ff" stroke="#c23260" stroke-width="1.5"/>
                        <line x1="112" y1="30" x2="112" y2="52" stroke="#c23260" stroke-width="1.5"/>
                        <path d="M30 58 c-3-4 -9-2 -9 3 c0 4 5 7 9 10 c4-3 9-6 9-10 c0-5 -6-7 -9-3 z" fill="#fff" opacity="0.85"/>
                        <circle cx="185" cy="66" r="4" fill="#ffe9a8"/>
                        <g class="wheel" style="transform-origin:52px 80px;">
                            <circle cx="52" cy="80" r="13" fill="#3f2a35"/><circle cx="52" cy="80" r="6" fill="#ffd7e4"/>
                            <line x1="52" y1="70" x2="52" y2="90" stroke="#3f2a35" stroke-width="2"/>
                            <line x1="42" y1="80" x2="62" y2="80" stroke="#3f2a35" stroke-width="2"/>
                        </g>
                        <g class="wheel" style="transform-origin:150px 80px;">
                            <circle cx="150" cy="80" r="13" fill="#3f2a35"/><circle cx="150" cy="80" r="6" fill="#ffd7e4"/>
                            <line x1="150" y1="70" x2="150" y2="90" stroke="#3f2a35" stroke-width="2"/>
                            <line x1="140" y1="80" x2="160" y2="80" stroke="#3f2a35" stroke-width="2"/>
                        </g>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Trái tim khổng lồ -->
    <div class="giant-heart-3d" id="giantHeart3D">❤️</div>

    <!-- Audio -->
    <audio id="tingSound" src="ting.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
